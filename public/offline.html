<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="theme-color" content="#000000" />

    <title>NextGrid Style — Offline</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            overflow: hidden;

            background: #000;
            color: #fff;

            font-family:
                Inter,
                Poppins,
                system-ui,
                sans-serif;
        }

        body {
            position: relative;

            display: flex;
            align-items: center;
            justify-content: center;

            padding: 24px;
        }

        .background {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 0;
        }

        .grid {
            position: absolute;
            inset: 0;

            opacity: 0.04;

            background-image:
                linear-gradient(to right,
                    rgba(255, 255, 255, 0.06) 1px,
                    transparent 1px),
                linear-gradient(to bottom,
                    rgba(255, 255, 255, 0.06) 1px,
                    transparent 1px);

            background-size: 80px 80px;
        }

        .glow-pink {
            position: absolute;
            top: -180px;
            left: -180px;

            width: 420px;
            height: 420px;

            border-radius: 9999px;

            background: rgba(236, 72, 153, 0.22);

            filter: blur(120px);
        }

        .glow-cyan {
            position: absolute;
            right: -180px;
            top: 20%;

            width: 420px;
            height: 420px;

            border-radius: 9999px;

            background: rgba(6, 182, 212, 0.22);

            filter: blur(120px);
        }

        .glow-center {
            position: absolute;
            left: 50%;
            top: 50%;

            width: 420px;
            height: 420px;

            transform: translate(-50%, -50%);

            border-radius: 9999px;

            background: rgba(255, 255, 255, 0.06);

            filter: blur(140px);
        }

        .card {
            position: relative;
            z-index: 10;

            width: 100%;
            max-width: 520px;

            padding: 42px 32px;

            border:
                1px solid rgba(255, 255, 255, 0.08);

            border-radius: 32px;

            background:
                rgba(255, 255, 255, 0.04);

            text-align: center;

            box-shadow:
                0 0 60px rgba(255, 255, 255, 0.05);
        }

        .logo {
            margin-bottom: 18px;

            font-size: 34px;
            font-weight: 800;
            letter-spacing: 0.12em;

            text-transform: uppercase;
        }

        .status {
            display: inline-flex;
            align-items: center;
            justify-content: center;

            gap: 8px;

            margin-bottom: 20px;

            padding: 10px 18px;

            border-radius: 9999px;

            background:
                rgba(255, 255, 255, 0.06);

            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .dot {
            width: 10px;
            height: 10px;

            border-radius: 9999px;

            background: #ff4d6d;

            animation: pulse 1.5s infinite;
        }

        h1 {
            margin-bottom: 16px;

            font-size: 42px;
            font-weight: 800;
            line-height: 1.1;
        }

        p {
            color: rgba(255, 255, 255, 0.7);

            font-size: 16px;
            line-height: 1.7;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;

            margin-top: 30px;

            padding: 14px 28px;

            border: none;
            border-radius: 9999px;

            background: #fff;
            color: #000;

            font-size: 15px;
            font-weight: 700;

            cursor: pointer;

            transition:
                transform 0.25s ease,
                opacity 0.25s ease;
        }

        .button:hover {
            opacity: 0.92;
            transform: translateY(-2px);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.4);
                opacity: 0.5;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 640px) {
            .card {
                padding: 34px 24px;
            }

            h1 {
                font-size: 34px;
            }

            p {
                font-size: 15px;
            }
        }
    </style>
</head>

<body>
    <div class="background">
        <div class="grid"></div>

        <div class="glow-pink"></div>

        <div class="glow-cyan"></div>

        <div class="glow-center"></div>
    </div>

    <div class="card">
        <div class="logo">
            NextGrid Style
        </div>

        <div class="status">
            <span class="dot"></span>
            Offline Mode
        </div>

        <h1>
            You Are Offline
        </h1>

        <p>
            Your internet connection appears to be unavailable.
            Please reconnect to continue exploring the luxury
            futuristic fashion experience.
        </p>

        <button class="button" onclick="window.location.reload()">
            Retry Connection
        </button>
    </div>
</body>

</html>
